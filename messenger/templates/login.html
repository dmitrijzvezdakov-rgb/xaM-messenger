<div style="max-width: 300px; margin: 50px auto; font-family: sans-serif;">
    <h2>Вход в систему</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Имя пользователя" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>
        <input type="password" name="password" placeholder="Пароль" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>
        <button type="submit" style="width: 100%; padding: 10px; background: #28A745; color: white; border: none; cursor: pointer;">Войти</button>
    </form>
    <p>Нет аккаунта? <a href="/register">Регистрация</a></p>
</div>
